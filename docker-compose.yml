services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: leed
      POSTGRES_USER: leed
      POSTGRES_PASSWORD: leed
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://leed:leed@postgres:5432/leed
    ports: ["8000:8000"]
    volumes:
      - ./:/workspace
    depends_on: [postgres]
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]
volumes:
  postgres_data:
